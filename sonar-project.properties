sonar.projectKey=blindtest
sonar.projectName=Blindtest Music Quiz
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.jsx,**/*.test.js
sonar.exclusions=**/node_modules/**,**/dist/**,src/test/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=src/test/**,**/*.test.jsx,**/*.test.js,src/main.jsx
